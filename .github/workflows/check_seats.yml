name: Check BIOL& 241 Seats

on:
  schedule:
    # Runs every 15 minutes between 8 AM and 9 PM PDT
    - cron: '*/15 15-23,0-4 * * *'
  workflow_dispatch: # This adds a button on GitHub to let you test it manually

jobs:
  check-seats:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code and state.json from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Boot up a Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install Playwright and the headless browser WITH Linux dependencies
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # 4. Run your script while securely injecting your passwords
      - name: Run seat checker
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python check_seats.py
